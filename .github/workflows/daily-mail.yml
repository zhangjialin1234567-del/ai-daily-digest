name: Send AI Daily Digest to Email

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build-and-send:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 拉取最新代码
        uses: actions/checkout@v4

      - name: ⚙️ 配置 Bun 运行环境
        uses: oven-sh/setup-bun@v1

      - name: 🤖 运行脚本生成精选日报
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: npx -y bun scripts/digest.ts --hours 24 --top-n 15 --lang zh --output ./digest.md

      - name: 📝 修改正文主标题为中英文对照
        run: |
          # 自动将原本生成的纯中文 H1 标题替换为中英对照
          sed -i 's/# AI 博客每日精选/# 🚀 AI 博客每日精选 | AI Daily Digest/g' digest.md

      - name: 💅 注入精美 CSS 排版样式
        run: |
          echo "<style>
            body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; line-height: 1.6; color: #333; max-width: 800px; margin: 0 auto; padding: 10px; }
            h1 { color: #1a1a1a; font-size: 22px; border-bottom: 2px solid #eaecef; padding-bottom: 8px; margin-bottom: 16px; }
            h2 { color: #24292e; font-size: 18px; margin-top: 24px; border-bottom: 1px solid #eaecef; padding-bottom: 6px; }
            h3 { color: #005cc5; font-size: 16px; margin-top: 20px; margin-bottom: 8px; }
            a { color: #0066cc; text-decoration: none; font-weight: 500; }
            a:hover { text-decoration: underline; }
            blockquote { border-left: 4px solid #005cc5; padding: 12px 16px; margin: 12px 0; color: #4a5568; background-color: #f3f8fd; border-radius: 0 6px 6px 0; font-size: 14px; }
            ul, ol { padding-left: 20px; margin-top: 8px; }
            li { margin-bottom: 6px; }
            hr { height: 1px; background-color: #e1e4e8; border: none; margin: 24px 0; }
            strong { color: #24292e; }
          </style>" > style.css
          cat style.css digest.md > temp.md
          mv temp.md digest.md

      - name: 📧 发送邮件到你的邮箱
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          # 【这里将邮件本身的主题改为了中英对照】
          subject: "🚀 AI 博客每日精选 | AI Daily Digest"
          to: ${{ secrets.TO_EMAIL }}
          from: "AI Digest Bot <${{ secrets.SMTP_USERNAME }}>"
          html_body: file://digest.md
          convert_markdown: true
